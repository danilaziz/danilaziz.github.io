<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Mengalihkan...</title>
    <script>
      (function () {
        const path = window.location.pathname;
        const docsPrefix = '/docs';

        if (!path.startsWith(docsPrefix)) {
          window.location.replace('/docs/');
          return;
        }

        const route = path.slice(docsPrefix.length) || '/';
        const target = `${window.location.origin}/docs/?p=${encodeURIComponent(route)}${window.location.hash || ''}`;
        window.location.replace(target);
      })();
    </script>
  </head>
  <body>
    <p>Mengalihkan...</p>
  </body>
</html>
