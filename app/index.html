<!doctype html>
<html lang="id" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfolio Danil Aziz, pengembang web yang membantu bisnis, UMKM, dan personal brand tampil lebih profesional melalui website modern, elegan, dan premium."
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/webp" href="/danil.webp" />
    <link
      rel="preload"
      as="image"
      href="/danilaziz-hero-mobile.webp"
      imagesrcset="/danilaziz-hero-mobile.webp 480w, /danilaziz-hero.webp 768w"
      imagesizes="(max-width: 768px) 92vw, 720px"
      fetchpriority="high"
    />
    <title>Danil Aziz | Portfolio Web Developer</title>
    <script>
      (function () {
        const path = window.location.pathname;
        if (path.startsWith('/docs')) {
          const route = path.slice('/docs'.length) || '/';
          const search = window.location.search || '';
          const target = `${window.location.origin}${route}${search}${window.location.hash || ''}`;
          window.location.replace(target);
          return;
        }

        const params = new URLSearchParams(window.location.search);
        const redirectPath = params.get('p');
        if (!redirectPath) return;

        const cleanPath = redirectPath.startsWith('/') ? redirectPath : `/${redirectPath}`;
        const nextUrl = `${window.location.origin}${cleanPath}${window.location.hash || ''}`;
        window.history.replaceState(null, '', nextUrl);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
