<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Mengalihkan...</title>
    <script>
      (function () {
        const path = window.location.pathname;
        const target = `${window.location.origin}/?p=${encodeURIComponent(path)}${window.location.hash || ''}`;
        window.location.replace(target);
      })();
    </script>
  </head>
  <body>
    <p>Mengalihkan...</p>
  </body>
</html>
