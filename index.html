    <script>
      (function () {
        const path = window.location.pathname;
        const params = new URLSearchParams(window.location.search);
        const redirectPath = params.get('p');

          document.head.appendChild(mobileHero);

          var desktopHero = document.createElement('link');
          desktopHero.rel = 'preload';
          desktopHero.as = 'image';
          desktopHero.href = '/danilaziz-hero.webp';
          desktopHero.media = '(min-width: 768px)';
          desktopHero.fetchPriority = 'high';
          document.head.appendChild(desktopHero);
        }

        if (path.startsWith('/docs')) {
          const route = path.slice('/docs'.length) || '/';
          const search = window.location.search || '';
          const target = `${window.location.origin}${route}${search}${window.location.hash || ''}`;
          window.location.replace(target);
          return;
        }

        if (!redirectPath || redirectPath.includes('://') || redirectPath.startsWith('//')) return;

        const cleanPath = redirectPath.startsWith('/') ? redirectPath : `/${redirectPath}`;
        if (!/^\/[a-z0-9\-/_]*$/i.test(cleanPath)) return;

        const nextUrl = `${window.location.origin}${cleanPath}${window.location.hash || ''}`;
        window.history.replaceState(null, '', nextUrl);
      })();
    </script>
